<app-navbar></app-navbar>

<div class="d-flex">

  <!-- Sidebar -->
  <app-sidebar></app-sidebar>

  <!-- Main Content -->
  <div class="p-4 w-100" style="background:#f5f6fa; min-height:100vh;">

    <div class="container">

      <h3 class="mb-4 fw-bold text-dark"> Appointments</h3>

      <div class="card shadow-lg border-0 rounded-4">

        <div class="card-body">

          <div class="table-responsive">

            <table class="table align-middle">

              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Patient</th>
                  <th>Doctor</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>

              <tbody>

                <tr *ngFor="let a of appointments; let i = index">

                  <td>{{ i + 1 }}</td>

                  <td class="fw-semibold">{{ a.patient_name }}</td>

                  <td class="text-primary fw-semibold">
                    {{ a.doctor_name }}
                  </td>

                  <td>{{ a.date | date:'MMM d, y' }}</td>

                  <td>{{ a.time }}</td>

                  <td>
                    <span class="badge px-3 py-2"
                          [ngClass]="a.status === 'booked' ? 'bg-success' : 'bg-danger'">
                      {{ a.status }}
                    </span>
                  </td>

                  <td>
                    <button class="btn btn-outline-danger btn-sm px-3"
                            (click)="cancel(a.id)">
                      Cancel
                    </button>
                  </td>

                </tr>

              </tbody>

            </table>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
