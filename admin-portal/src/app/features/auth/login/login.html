<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4" style="width: 350px;">
    
    <h3 class="text-center mb-3">Admin Login</h3>

    <input [(ngModel)]="mobile" class="form-control mb-3" placeholder="Mobile">
    <input [(ngModel)]="password" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100 mb-3" (click)="login()">
      Login
    </button>

    
    <p class="text-center mb-0">
      Don’t have an account?
      <a routerLink="/signup">Register</a>
    </p>

  </div>
</div>
