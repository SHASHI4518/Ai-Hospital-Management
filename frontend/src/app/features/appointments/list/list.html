
<div class="container mt-4">

  <h2 class="text-center mb-4">My Appointments</h2>

  <div class="row">
    <div class="col-md-6 mb-3"
         *ngFor="let a of appointments; trackBy: trackById">

      <div class="card shadow p-3">
     <button *ngIf="a.status === 'cancelled'"
        class="btn btn-sm btn-danger position-absolute top-0 end-0 m-2 rounded-circle"
        (click)="deleteHistory(a.id)">
  ❌
</button>
          <!-- GET DOCTOR -->
        <ng-container *ngIf="getDoctor(a.doctor_id) as doc">

          <div class="d-flex align-items-center">

            <!-- IMAGE -->
          <img [src]="'http://localhost:8080' + doc.image"
                 class="rounded-circle me-3"
                 width="80"
                 height="80"
                 style="object-fit: cover;">

            <!-- DETAILS -->
            <div>
              <h5 class="text-primary mb-1">{{ doc.name }}</h5>
              <p class="mb-1 fw-bold">{{ doc.specialization }}</p>
              <p class="mb-1">Clinic: {{ doc.clinic }}</p>
              <p class="mb-1">Location: {{ doc.location }}</p>
              <p class="text-success fw-bold mb-0">₹{{ doc.fee }}</p>
            </div>

          </div>

        </ng-container>

        <hr>

        <!-- APPOINTMENT DETAILS -->
        <p><b>Date:</b> {{ a.date | date:'yyyy-MM-dd' }}</p>
        <p><b>Time:</b> {{ a.time }}</p>

        <p>
          <b>Status:</b>
          <span [ngClass]="{
            'text-success': a.status === 'booked',
            'text-danger': a.status === 'cancelled'
          }">
            {{ a.status }}
          </span>
        </p>

        <!-- CANCEL -->
        <button class="btn btn-danger w-100"
                (click)="cancel(a.id)">
          Cancel
        </button>

      </div>

    </div>

  </div>

</div>
